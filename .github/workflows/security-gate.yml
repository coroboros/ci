# Security Gate CI
name: Security Gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - id: detect
        name: Route supply-chain scan by ecosystem
        shell: bash
        # One tool per repo, never both — cargo-deny covers a Rust crate's vulns, so osv
        # must not double-scan it.
        run: |
          if [ -f Cargo.toml ]; then
            echo "::notice::Cargo.toml present — supply-chain via cargo-deny"
            echo "ecosystem=rust" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::no Cargo.toml — supply-chain via osv-scanner"
            echo "ecosystem=other" >> "${GITHUB_OUTPUT}"
          fi

      - if: ${{ steps.detect.outputs.ecosystem == 'rust' }}
        uses: coroboros/ci/.github/actions/security/rust/cargo-deny@v0
        with:
          checks: "advisories bans sources"

      - if: ${{ steps.detect.outputs.ecosystem == 'other' }}
        uses: coroboros/ci/.github/actions/security/osv-scanner@v0

  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: coroboros/ci/.github/actions/security/gitleaks@v0
