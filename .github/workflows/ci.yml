name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: actionlint
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.12
    steps:
      - uses: actions/checkout@v4

      - name: check-workflow-lint
        run: |
          bash <(curl -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "${ACTIONLINT_VERSION}"
          ./actionlint -color

  smoke-setup-pnpm-node:
    name: smoke setup-pnpm-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: '22'
          install: 'false'

      - name: check-tool-versions
        run: node --version && pnpm --version
        shell: bash
