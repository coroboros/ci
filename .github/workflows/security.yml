# Security CI
name: Security

on:
  workflow_call:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  GITLEAKS_CONFIG_PATH: "security/.gitleaks.toml"
  SCAN_MODE: "git"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Resolve gitleaks config
        shell: bash
        run: |
          if [ ! -f "${GITLEAKS_CONFIG_PATH}" ]; then
            echo "::notice::No local ${GITLEAKS_CONFIG_PATH} — fetching canonical ruleset from coroboros/ci"
            mkdir -p "$(dirname "${GITLEAKS_CONFIG_PATH}")"
            curl -fsSL \
              "https://raw.githubusercontent.com/coroboros/ci/main/security/.gitleaks.toml" \
              -o "${GITLEAKS_CONFIG_PATH}"
          fi
          echo "Using ${GITLEAKS_CONFIG_PATH}"

      - name: Install gitleaks
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" \
            -o "${tmp}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tmp}/${tarball}" | sha256sum -c -
          tar -xzf "${tmp}/${tarball}" -C "${tmp}" gitleaks
          sudo install -m 0755 "${tmp}/gitleaks" /usr/local/bin/gitleaks
          rm -rf "${tmp}"
          gitleaks version

      - name: Run gitleaks
        id: scan
        shell: bash
        run: |
          set +e
          gitleaks "${SCAN_MODE}" \
            --config "${GITLEAKS_CONFIG_PATH}" \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path results.sarif \
            --exit-code 2
          rc=$?
          set -e

          echo "gitleaks exit code: ${rc}"
          echo "exit-code=${rc}" >> "${GITHUB_OUTPUT}"

          if [ "${rc}" = "0" ]; then
            echo "::notice::gitleaks: no leaks found"
          elif [ "${rc}" = "2" ]; then
            echo "::error::gitleaks: leaks detected — see results.sarif artifact"
            exit 1
          else
            echo "::error::gitleaks: scan failed with exit code ${rc}"
            exit "${rc}"
          fi

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 30

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
