# Security CI
name: Security

on:
  workflow_call:

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  licenses:
    runs-on: ubuntu-latest
    # Advisory — reports a non-allowed license, never blocks the release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: detect
        name: Detect a Rust manifest
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::no Cargo.toml — license check skipped (Rust-only)"
            echo "rust=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: ${{ steps.detect.outputs.rust == 'true' }}
        uses: coroboros/ci/.github/actions/security/rust/cargo-deny@v0
        with:
          checks: "licenses"
