# Security CI
name: Security

on:
  workflow_call:

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  licenses:
    runs-on: ubuntu-latest
    # Advisory — reports a non-allowed license, never blocks the release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - id: detect
        name: Detect a Rust manifest
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::no Cargo.toml — license check skipped (Rust-only)"
            echo "rust=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: ${{ steps.detect.outputs.rust == 'true' }}
        uses: coroboros/ci/.github/actions/security/rust/cargo-deny@v0
        with:
          checks: "licenses"
