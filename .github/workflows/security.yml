# Security CI
name: Security

on:
  workflow_call:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  GITLEAKS_CONFIG: ".coroboros-ci/security/.gitleaks.toml"
  SCAN_MODE: "git"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout canonical gitleaks config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: coroboros/ci
          path: .coroboros-ci
          sparse-checkout: |
            security/.gitleaks.toml
          sparse-checkout-cone-mode: false

      - name: Install gitleaks
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" \
            -o "${tmp}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tmp}/${tarball}" | sha256sum -c -
          tar -xzf "${tmp}/${tarball}" -C "${tmp}" gitleaks
          sudo install -m 0755 "${tmp}/gitleaks" /usr/local/bin/gitleaks
          rm -rf "${tmp}"
          gitleaks version

      - name: Run gitleaks
        id: scan
        shell: bash
        run: |
          set +e
          gitleaks "${SCAN_MODE}" \
            --config "${GITLEAKS_CONFIG}" \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path results.sarif \
            --exit-code 2
          rc=$?
          set -e

          echo "gitleaks exit code: ${rc}"
          echo "exit-code=${rc}" >> "${GITHUB_OUTPUT}"

          if [ "${rc}" = "0" ]; then
            echo "::notice::gitleaks: no leaks found"
          elif [ "${rc}" = "2" ]; then
            echo "::error::gitleaks: leaks detected — see results.sarif artifact"
            exit 1
          else
            echo "::error::gitleaks: scan failed with exit code ${rc}"
            exit "${rc}"
          fi

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 30

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./
