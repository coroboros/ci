# Security CI
name: Security

on:
  workflow_call:

permissions:
  contents: read

jobs:
  review-dependencies:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  check-licenses:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - id: detect
        name: Detect a Rust manifest
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::no Cargo.toml — license check skipped (Rust-only)"
            echo "rust=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: ${{ steps.detect.outputs.rust == 'true' }}
        uses: coroboros/ci/.github/actions/security/rust/cargo-deny@v0
        with:
          checks: "licenses"
