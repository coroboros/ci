# JavaScript NPM Packages CI
name: JavaScript NPM Packages

on:
  workflow_call:
    secrets:
      NPM_CONFIG_FILE:
        required: true
      NPM_EXTRA_CONFIG:
        required: false
      NPM_PACKAGE_REGISTRY:
        required: true
      NPM_PACKAGE_PROXY_REGISTRY:
        required: false
      NPM_PACKAGE_REGISTRY_TOKEN:
        required: false

permissions:
  contents: read

# Tags serialize per repo so one release's commit-back can't race another's; branches key
# per ref and cancel superseded runs, never an in-flight release.
concurrency:
  group: release-${{ github.ref_type == 'tag' && github.repository || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  NPM_CONFIG_FILE: ${{ secrets.NPM_CONFIG_FILE }}
  NPM_EXTRA_CONFIG: ${{ secrets.NPM_EXTRA_CONFIG }}
  NPM_PACKAGE_REGISTRY: ${{ secrets.NPM_PACKAGE_REGISTRY }}
  NPM_PACKAGE_PROXY_REGISTRY: ${{ secrets.NPM_PACKAGE_PROXY_REGISTRY }}
  NPM_PACKAGE_REGISTRY_TOKEN: ${{ secrets.NPM_PACKAGE_REGISTRY_TOKEN }}

jobs:
  preflight:
    if: ${{ github.ref_type == 'branch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/javascript/base@v0

  security-gate:
    uses: ./.github/workflows/security-gate.yml

  publish-package:
    if: ${{ github.ref_type == 'tag' }}
    needs: [security-gate]   # no release ships until the security gate passes
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation + commit-back to main
      id-token: write   # for npm OIDC Trusted Publisher
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - uses: coroboros/ci/.github/actions/release/verify-tag@v0

      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/javascript/base@v0

      - name: Pin package.json to tag
        shell: bash
        run: pnpm version --allow-same-version --no-git-tag-version --no-git-checks "${GITHUB_REF_NAME}"

      - id: changelog
        uses: coroboros/ci/.github/actions/release/generate-changelog@v0

      - name: Publish
        shell: bash
        run: |
          if [ -n "${NPM_PACKAGE_REGISTRY_TOKEN}" ]; then
            echo "::notice::Publishing with NPM_PACKAGE_REGISTRY_TOKEN auth via npm CLI"
            # The pre-Trusted-Publisher bootstrap path can't reliably use
            # pnpm 11.x (auto-OIDC, no fallback to .npmrc token) or pnpm
            # 10.33.0 (corepack intercepts every `pnpm`; the standalone
            # binary self-switches on a `packageManager: pnpm@11.x` pin).
            # npm CLI is not managed by corepack and does not auto-attempt
            # OIDC — it reads `_authToken` from `.npmrc` directly and PUTs.
            # The publish artifact is identical to pnpm publish (same
            # `files`, same `prepublishOnly`). Full rationale: CHANGELOG
            # v0.1.10.
            npm --version
            npm publish --ignore-scripts --access public
          else
            echo "::notice::Publishing with OIDC Trusted Publisher + provenance"
            pnpm publish --provenance --no-git-checks --ignore-scripts
          fi

      - uses: coroboros/ci/.github/actions/release/github-release@v0
        with:
          body: ${{ steps.changelog.outputs.body }}

      - uses: coroboros/ci/.github/actions/release/commit-artifacts@v0
        with:
          files: CHANGELOG.md package.json pnpm-lock.yaml

  security:
    uses: ./.github/workflows/security.yml
