# Pipeline (mirrors the GitLab origin's stage order):
#   base -> setup -> check -> build -> test -> deploy -> notify
#
# Stages exercised:
#   base        — base job (setup-base composite action)
#   setup       — setup-npmrc
#   check       — check-docs, check-npm-lint
#   build       — build-js, build-version (tag)
#   test        — test-npm-unit
#   deploy      — deploy-package (tag)
#   notify      — notify sub-workflow (tag)
#
# Pull requests are excluded by the top-level `on:` block of each reusable workflow.
name: JavaScript NPM Packages CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Fallback Node.js version when no `.node-version` file is present at the consumer repo root.
        type: string
        required: false
        default: ""
      provenance:
        description: When `true`, pass `--provenance` to `pnpm publish` (requires npm Trusted Publisher OIDC). Set to `false` to fall back to publishing with `NPM_PACKAGE_REGISTRY_TOKEN` as `NODE_AUTH_TOKEN`.
        type: boolean
        required: false
        default: true
    secrets:
      NPM_CONFIG_FILE:
        required: true
      NPM_PACKAGE_REGISTRY:
        required: true
      NPM_PACKAGE_PROXY_REGISTRY:
        required: true
      NPM_PACKAGE_REGISTRY_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      GOOGLE_CHAT_WEBHOOK_URL:
        required: false

permissions:
  contents: read

env:
  CI_TEXT_RED: "\e[31m"
  CI_TEXT_GREEN: "\e[32m"
  CI_TEXT_CLEAR: "\e[0m"

jobs:
  base:
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.b.outputs.node-version }}
      release-branch-pattern: ${{ steps.b.outputs.release-branch-pattern }}
      release-source-commit-pattern: ${{ steps.b.outputs.release-source-commit-pattern }}
      npm-extra-config: ${{ steps.b.outputs.npm-extra-config }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: b
        uses: coroboros/ci/.github/actions/setup-base@v0
        with:
          node-version: ${{ inputs.node-version }}

  setup-npmrc:
    runs-on: ubuntu-latest
    needs: [base]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/javascript/npm/setup-npmrc@v0
        with:
          npm-config-file: ${{ secrets.NPM_CONFIG_FILE }}
          npm-extra-config: ${{ needs.base.outputs.npm-extra-config }}

  check-docs:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-docs@v0

  check-npm-lint:
    runs-on: ubuntu-latest
    needs: [base, setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/javascript/npm/pnpm-install@v0
        with:
          node-version: ${{ needs.base.outputs.node-version }}
      - run: pnpm run lint
        shell: bash

  build-js:
    runs-on: ubuntu-latest
    needs: [base, check-docs, check-npm-lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/javascript/npm/build-js@v0
        with:
          node-version: ${{ needs.base.outputs.node-version }}

  build-version:
    runs-on: ubuntu-latest
    needs: [base, check-docs, check-npm-lint]
    if: |
      github.ref_type == 'tag'
      || contains(github.event.head_commit.message, 'Merge branch ''release/')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/javascript/npm/build-version@v0
        with:
          release-branch-pattern: ${{ needs.base.outputs.release-branch-pattern }}
          release-source-commit-pattern: ${{ needs.base.outputs.release-source-commit-pattern }}
          node-version: ${{ needs.base.outputs.node-version }}

  test-npm-unit:
    runs-on: ubuntu-latest
    needs: [base, build-js, build-version]
    if: always() && needs.build-js.result == 'success' && (needs.build-version.result == 'success' || needs.build-version.result == 'skipped')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/javascript/npm/pnpm-install@v0
        with:
          node-version: ${{ needs.base.outputs.node-version }}
      - run: pnpm test
        shell: bash

  deploy-package:
    runs-on: ubuntu-latest
    needs: [base, test-npm-unit, build-js, build-version]
    if: ${{ github.ref_type == 'tag' }}
    permissions:
      id-token: write   # required for npm OIDC Trusted Publisher.
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ needs.base.outputs.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Enable corepack + activate pnpm
        shell: bash
        run: |
          corepack enable
          pnpm --version

      - name: Download .npmrc
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: npmrc
          path: .

      - name: Download dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist

      - name: Download package-version
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: package-version
          path: .

      - name: Install (prod, frozen lockfile, ignore scripts)
        # pnpm --frozen-lockfile fails if pnpm-lock.yaml is missing or stale,
        # giving us the integrity check that `npm audit signatures` provided.
        run: pnpm install --frozen-lockfile --ignore-scripts --prod
        shell: bash

      - name: pnpm publish (OIDC + NPM_PACKAGE_REGISTRY_TOKEN fallback)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGE_REGISTRY_TOKEN }}
          WITH_PROVENANCE: ${{ inputs.provenance }}
        run: |
          if [ "${WITH_PROVENANCE}" = "true" ]; then
            pnpm publish --provenance --no-git-checks
          else
            pnpm publish --no-git-checks
          fi
        shell: bash

  notify:
    needs: [deploy-package]
    if: always() && needs.deploy-package.result != 'skipped'
    uses: coroboros/ci/.github/workflows/notify.yml@v0
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
