name: npm-package release

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version for the release runner.
        type: string
        default: '22'
      working-directory:
        description: Path to the package root inside the consuming repo.
        type: string
        default: '.'
      registry-url:
        description: npm registry URL.
        type: string
        default: https://registry.npmjs.org
      publish-via:
        description: CLI to publish with — `pnpm` or `npm`.
        type: string
        default: pnpm
      use-oidc:
        description: Publish via npm Trusted Publisher. When false, requires `NPM_TOKEN`.
        type: boolean
        default: true
      access:
        description: Package access — `public` or `restricted`.
        type: string
        default: public
      provenance:
        description: Emit provenance attestation.
        type: boolean
        default: true
      auto-version:
        description: |
          When true, CI rewrites `package.json.version` from `github.ref_name`, builds a CHANGELOG entry from Conventional Commits since the previous tag, publishes, and commits the bump back to `default-branch`. When false, CI asserts the tag matches `package.json.version` and publishes without writing anything back.
        type: boolean
        default: true
      default-branch:
        description: Target branch for the release-bump commit.
        type: string
        default: main
      require-docs-dir:
        description: Also require a `docs/` directory.
        type: boolean
        default: false
      lint-command:
        type: string
        default: pnpm lint
      typecheck-command:
        type: string
        default: pnpm typecheck
      test-command:
        type: string
        default: pnpm test
      build-command:
        type: string
        default: pnpm build
    secrets:
      NPM_TOKEN:
        description: Required only when `use-oidc` is false.
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: deploy-package (${{ inputs.publish-via }} / ${{ inputs.use-oidc && 'oidc' || 'token' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: coroboros/ci/.github/actions/setup-pnpm-node@v1
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      # ─── stage: check ─────────────────────────────────────────────────────
      - name: check-docs
        uses: coroboros/ci/.github/actions/check-docs@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          require-docs-dir: ${{ inputs.require-docs-dir }}

      - name: check-npm-lint
        uses: coroboros/ci/.github/actions/check-npm-lint@v1
        with:
          command: ${{ inputs.lint-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: check-npm-typecheck
        uses: coroboros/ci/.github/actions/check-npm-typecheck@v1
        with:
          command: ${{ inputs.typecheck-command }}
          working-directory: ${{ inputs.working-directory }}

      # ─── stage: build ─────────────────────────────────────────────────────
      - name: build-js
        uses: coroboros/ci/.github/actions/build-js@v1
        with:
          command: ${{ inputs.build-command }}
          working-directory: ${{ inputs.working-directory }}

      - id: build-version
        name: build-version
        if: inputs.auto-version
        uses: coroboros/ci/.github/actions/bump-version-from-tag@v1
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: build-version (verify-only)
        if: ${{ !inputs.auto-version }}
        uses: coroboros/ci/.github/actions/verify-tag-version@v1
        with:
          working-directory: ${{ inputs.working-directory }}

      - id: build-changelog
        name: build-changelog
        if: inputs.auto-version
        uses: coroboros/ci/.github/actions/generate-changelog@v1
        with:
          version: ${{ steps.build-version.outputs.version }}
          working-directory: ${{ inputs.working-directory }}

      # ─── stage: test ──────────────────────────────────────────────────────
      - name: test-npm-unit
        uses: coroboros/ci/.github/actions/test-npm-unit@v1
        with:
          command: ${{ inputs.test-command }}
          working-directory: ${{ inputs.working-directory }}

      # ─── stage: deploy ────────────────────────────────────────────────────
      - name: deploy-npm-package
        uses: coroboros/ci/.github/actions/deploy-npm-package@v1
        with:
          publish-via: ${{ inputs.publish-via }}
          use-oidc: ${{ inputs.use-oidc }}
          access: ${{ inputs.access }}
          provenance: ${{ inputs.provenance }}
          working-directory: ${{ inputs.working-directory }}
          npm-token: ${{ secrets.NPM_TOKEN }}

      # ─── stage: post-deploy ───────────────────────────────────────────────
      - name: post-deploy-commit-back
        if: inputs.auto-version
        uses: coroboros/ci/.github/actions/post-deploy-commit-back@v1
        with:
          paths: package.json CHANGELOG.md
          commit-message: 'chore(release): ${{ github.ref_name }}'
          default-branch: ${{ inputs.default-branch }}
          working-directory: ${{ inputs.working-directory }}

      - name: post-deploy-github-release
        if: inputs.auto-version
        uses: coroboros/ci/.github/actions/post-deploy-github-release@v1
        with:
          tag: ${{ github.ref_name }}
          title: ${{ github.ref_name }}
          notes: ${{ steps.build-changelog.outputs.body }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
