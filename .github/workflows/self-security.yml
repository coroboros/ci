# Self-CI Security
name: Self-CI Security

# Local `./` refs so a PR self-tests its own security composites and workflows.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/security/gitleaks

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/security/osv-scanner

  security-gate:
    uses: ./.github/workflows/security-gate.yml

  security:
    uses: ./.github/workflows/security.yml
