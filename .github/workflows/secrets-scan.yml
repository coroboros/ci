name: secrets scan (gitleaks)

on:
  workflow_call:
    inputs:
      config-ref:
        description: Ref of coroboros/ci to fetch the shared .gitleaks.toml from.
        type: string
        default: v1
      gitleaks-version:
        description: gitleaks binary version (without leading `v`).
        type: string
        default: '8.21.0'
  workflow_dispatch:
    inputs:
      config-ref:
        type: string
        default: v1

permissions:
  contents: read

jobs:
  scan:
    name: scan staged + history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup-gitleaks-config
        run: |
          curl -fsSL -o .gitleaks.toml \
            "https://raw.githubusercontent.com/coroboros/ci/${{ inputs.config-ref }}/.gitleaks.toml"

      - name: setup-gitleaks
        run: |
          ver="${{ inputs.gitleaks-version }}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: security-scan-secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks git \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
              --config .gitleaks.toml --redact --verbose
          else
            gitleaks git --config .gitleaks.toml --redact --verbose
          fi
