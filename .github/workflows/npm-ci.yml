name: npm-package CI

on:
  workflow_call:
    inputs:
      node-versions:
        description: JSON array of Node versions to run the matrix on.
        type: string
        default: '["22", "current"]'
      working-directory:
        description: Path to the package root inside the consuming repo.
        type: string
        default: '.'
      lint-command:
        description: Shell command for lint.
        type: string
        default: pnpm lint
      typecheck-command:
        description: Shell command for typecheck.
        type: string
        default: pnpm typecheck
      test-command:
        description: Shell command for tests.
        type: string
        default: pnpm test
      build-command:
        description: Shell command for build.
        type: string
        default: pnpm build
      package-dry-run:
        description: Run `pnpm publish --dry-run` on PRs to validate the tarball.
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      node-versions:
        type: string
        default: '["22", "current"]'

permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: coroboros/ci/.github/actions/setup-pnpm-node@v1
        with:
          node-version: ${{ matrix.node }}

      # ─── stage: check ─────────────────────────────────────────────────────
      - name: check-docs
        run: |
          if [ ! -f README.md ]; then
            echo "::error::README.md must be present at project root"
            exit 1
          fi

      - name: check-npm-lint
        run: ${{ inputs.lint-command }}

      - name: check-npm-typecheck
        run: ${{ inputs.typecheck-command }}

      # ─── stage: build ─────────────────────────────────────────────────────
      - name: build-js
        run: ${{ inputs.build-command }}

      # ─── stage: test ──────────────────────────────────────────────────────
      - name: test-npm-unit
        run: ${{ inputs.test-command }}

  pack-check:
    name: pack-check
    if: github.event_name == 'pull_request' && inputs.package-dry-run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - uses: coroboros/ci/.github/actions/setup-pnpm-node@v1
        with:
          node-version: '22'

      - name: pack-check
        run: pnpm publish --dry-run --no-git-checks
