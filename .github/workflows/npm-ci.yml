name: npm-package CI

on:
  workflow_call:
    inputs:
      node-versions:
        description: JSON array of Node versions to run the matrix on.
        type: string
        default: '["22", "current"]'
      working-directory:
        description: Path to the package root inside the consuming repo.
        type: string
        default: '.'
      lint-command:
        description: Shell command for lint.
        type: string
        default: pnpm lint
      typecheck-command:
        description: Shell command for typecheck.
        type: string
        default: pnpm typecheck
      test-command:
        description: Shell command for tests.
        type: string
        default: pnpm test
      build-command:
        description: Shell command for build.
        type: string
        default: pnpm build
      require-docs-dir:
        description: Also require a `docs/` directory.
        type: boolean
        default: false
      package-dry-run:
        description: Run `pnpm publish --dry-run` on PRs.
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      node-versions:
        type: string
        default: '["22", "current"]'

permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(inputs.node-versions) }}
    steps:
      - uses: actions/checkout@v4

      - uses: coroboros/ci/.github/actions/setup-pnpm-node@v1
        with:
          node-version: ${{ matrix.node }}

      # ─── stage: check ─────────────────────────────────────────────────────
      - name: check-docs
        uses: coroboros/ci/.github/actions/check-docs@v1
        with:
          working-directory: ${{ inputs.working-directory }}
          require-docs-dir: ${{ inputs.require-docs-dir }}

      - name: check-npm-lint
        uses: coroboros/ci/.github/actions/check-npm-lint@v1
        with:
          command: ${{ inputs.lint-command }}
          working-directory: ${{ inputs.working-directory }}

      - name: check-npm-typecheck
        uses: coroboros/ci/.github/actions/check-npm-typecheck@v1
        with:
          command: ${{ inputs.typecheck-command }}
          working-directory: ${{ inputs.working-directory }}

      # ─── stage: build ─────────────────────────────────────────────────────
      - name: build-js
        uses: coroboros/ci/.github/actions/build-js@v1
        with:
          command: ${{ inputs.build-command }}
          working-directory: ${{ inputs.working-directory }}

      # ─── stage: test ──────────────────────────────────────────────────────
      - name: test-npm-unit
        uses: coroboros/ci/.github/actions/test-npm-unit@v1
        with:
          command: ${{ inputs.test-command }}
          working-directory: ${{ inputs.working-directory }}

  pack-check:
    name: pack-check
    if: github.event_name == 'pull_request' && inputs.package-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coroboros/ci/.github/actions/setup-pnpm-node@v1
        with:
          node-version: '22'

      - name: pack-check
        uses: coroboros/ci/.github/actions/pack-check@v1
        with:
          working-directory: ${{ inputs.working-directory }}
