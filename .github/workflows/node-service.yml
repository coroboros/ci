# Largest pipeline — combines JS build + container-image + deploy (dev/int/prod/dynamic) + docs/api check.
# Job dependencies:
#   - publish-image needs: build-version (optional), build-image-name (artifacts), setup-npmrc (artifacts).
#   - deploy-needs-base needs: build-image-name, publish-image, test-npm-unit.
# Karate/Postman API tests not yet wired up.
# `deploy-dynamic` uses a per-branch environment; GHA has no native auto-stop.
# `notify` runs only when at least one deploy succeeded.
name: Node Service CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: "22"
      dockerfile-path:
        type: string
        required: false
        default: Dockerfile
      image-target:
        type: string
        required: false
        default: ""
      image-tag:
        type: string
        required: false
        default: ""
      image-build-args:
        type: string
        required: false
        default: ""
      image-registry-mirror:
        type: string
        required: false
        default: ""
      release-branch-pattern:
        type: string
        required: false
        default: '^release[/]((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$'
      release-source-commit-pattern:
        type: string
        required: false
        default: "^Merge branch 'release[/]((0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*))' into 'master'"
      release:
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      deploy-dynamic-branch-regex:
        type: string
        required: false
        default: '^feat/.*'
      dev-branch:
        type: string
        required: false
        default: develop
      prod-branch:
        type: string
        required: false
        default: master
      npm-extra-config:
        type: string
        required: false
        default: ""
    secrets:
      NPM_CONFIG_FILE:
        required: true
      NPM_PACKAGE_REGISTRY:
        required: true
      NPM_PACKAGE_PROXY_REGISTRY:
        required: true
      NPM_PACKAGE_REGISTRY_TOKEN:
        required: true
      IMAGE_REGISTRY:
        required: true
      IMAGE_REGISTRY_USER:
        required: true
      IMAGE_REGISTRY_PASSWORD:
        required: true
      IMAGE_CACHE_REPO:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      GOOGLE_CHAT_WEBHOOK_URL:
        required: false

permissions:
  contents: read

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-readme@v0

  check-docs-api:
    runs-on: ubuntu-latest
    needs: [check-readme]
    continue-on-error: true   # source: allow_failure: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-docs-api@v0

  setup-npmrc:
    runs-on: ubuntu-latest
    needs: [check-readme]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/setup-npmrc@v0
        with:
          npm-config-file: ${{ secrets.NPM_CONFIG_FILE }}
          npm-extra-config: ${{ inputs.npm-extra-config }}

  check-npm-lint:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/pnpm-install@v0
        with:
          node-version: ${{ inputs.node-version }}
      - run: pnpm run lint
        shell: bash

  build-js:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/build-js@v0
        with:
          node-version: ${{ inputs.node-version }}

  build-version:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    if: |
      github.ref_type == 'tag'
      || contains(github.event.head_commit.message, 'Merge branch ''release/')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/build-version@v0
        with:
          release-branch-pattern: ${{ inputs.release-branch-pattern }}
          release-source-commit-pattern: ${{ inputs.release-source-commit-pattern }}

  test-npm-unit:
    runs-on: ubuntu-latest
    needs: [build-js]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/pnpm-install@v0
        with:
          node-version: ${{ inputs.node-version }}
      - run: pnpm test
        shell: bash

  build-image-name:
    runs-on: ubuntu-latest
    needs: [test-npm-unit]
    outputs:
      image: ${{ steps.name.outputs.image }}
      image-name: ${{ steps.name.outputs.image-name }}
      image-tag: ${{ steps.name.outputs.image-tag }}
      image-ref-tag: ${{ steps.name.outputs.image-ref-tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - id: name
        uses: coroboros/ci/.github/actions/build-image-name@v0
        with:
          image-registry: ${{ secrets.IMAGE_REGISTRY }}
          image-target: ${{ inputs.image-target }}
          image-tag: ${{ inputs.image-tag }}

  publish-image:
    runs-on: ubuntu-latest
    needs: [build-image-name, setup-npmrc, build-version]
    if: |
      always()
      && needs.build-image-name.result == 'success'
      && needs.setup-npmrc.result == 'success'
      && (needs.build-version.result == 'success' || needs.build-version.result == 'skipped')
    container:
      image: gcr.io/kaniko-project/executor:debug
      options: --user 0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        continue-on-error: true
        with:
          name: npmrc
          path: .
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        continue-on-error: true
        with:
          name: package-version
          path: .
      - uses: coroboros/ci/.github/actions/publish-image@v0
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}
          image-build-args: ${{ inputs.image-build-args }}
          image-cache-repo: ${{ secrets.IMAGE_CACHE_REPO }}
          image-registry: ${{ secrets.IMAGE_REGISTRY }}
          image-registry-user: ${{ secrets.IMAGE_REGISTRY_USER }}
          image-registry-password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
          image-registry-mirror: ${{ inputs.image-registry-mirror }}
          image: ${{ needs.build-image-name.outputs.image }}
          image-name: ${{ needs.build-image-name.outputs.image-name }}
          image-ref-tag: ${{ needs.build-image-name.outputs.image-ref-tag }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-image-name, publish-image, test-npm-unit]
    if: ${{ github.ref_name == inputs.dev-branch }}
    environment: development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/deploy-release@v0
        with:
          env-name: dev
          release: ${{ inputs.release }}

  deploy-int:
    runs-on: ubuntu-latest
    needs: [build-image-name, publish-image, test-npm-unit]
    if: ${{ startsWith(github.ref_name, 'release/') }}
    environment: int
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/deploy-release@v0
        with:
          env-name: int
          release: ${{ inputs.release }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build-image-name, publish-image, test-npm-unit]
    if: ${{ github.ref_name == inputs.prod-branch }}
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/deploy-release@v0
        with:
          env-name: prod
          release: ${{ inputs.release }}

  deploy-dynamic:
    runs-on: ubuntu-latest
    needs: [build-image-name, publish-image, test-npm-unit]
    # Source: $DEPLOY_DYNAMIC_BRANCH_REGEX && $CI_COMMIT_REF_NAME =~ $DEPLOY_DYNAMIC_BRANCH_REGEX (default ^feat/.*).
    if: ${{ startsWith(github.ref_name, 'feat/') }}
    environment:
      name: dynamic-${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/deploy-release@v0
        with:
          env-name: dev
          release: ${{ inputs.release }}
          is-dynamic: "true"
          environment-slug: ${{ github.ref_name }}

  notify:
    needs: [deploy-dev, deploy-int, deploy-prod, deploy-dynamic]
    if: |
      always()
      && (needs.deploy-dev.result == 'success'
       || needs.deploy-int.result == 'success'
       || needs.deploy-prod.result == 'success'
       || needs.deploy-dynamic.result == 'success')
    uses: coroboros/ci/.github/workflows/notify.yml@v0
    with:
      release-branch-pattern: ${{ inputs.release-branch-pattern }}
      release-source-commit-pattern: ${{ inputs.release-source-commit-pattern }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
