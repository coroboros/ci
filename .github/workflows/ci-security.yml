# Self-CI wrapper that runs `security.yml` against this repo's own tree.
# Mirrors the pattern of `ci.yml` (lint / yamllint / shellcheck self-validation).
name: CI Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  security:
    uses: ./.github/workflows/security.yml
    with:
      config-path: security/.gitleaks.toml
      fail-on-leak: true
