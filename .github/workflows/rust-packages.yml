# Rust Packages CI
name: Rust Packages

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  preflight:
    if: ${{ github.ref_type == 'branch' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/rust/base@v0

  # cargo-deny owns the Rust supply-chain controls osv-scanner doesn't: crate
  # sources (crates.io only), licenses, banned/wildcard deps, and unmaintained or
  # yanked advisories. Reads the repo's deny.toml. Runs on every push and gates
  # `publish` (see its `needs:`), so a release is re-checked against the latest
  # advisory DB before it ships — not only at PR time. The `security` job scans
  # in parallel for reporting and does not gate publish; this is the release gate.
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/security/cargo-deny@v0

  # gitleaks gates the release on a leaked secret, enforced by the template's
  # `needs:` rather than the consumer's branch protection — the GitLab
  # `security-gate` equivalent. Runs on every push and gates `publish`. The
  # `security` job runs gitleaks again in parallel for the SARIF report.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: coroboros/ci/.github/actions/security/gitleaks@v0

  publish:
    if: ${{ github.ref_type == 'tag' }}
    needs: [supply-chain, secrets]   # no release ships until cargo-deny and gitleaks pass
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation + commit-back to main
      id-token: write   # for crates.io OIDC Trusted Publishing
    # Empty on the OIDC path; set only for the first-publish bootstrap of a new
    # crate. Surfaced as env so the OIDC auth step can branch on its presence.
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify tag points to main HEAD
        shell: bash
        run: |
          if [ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]; then
            echo "::error::main has moved since the tag was pushed. Resolve manually."
            echo "  Tag SHA:    ${GITHUB_SHA}"
            echo "  main HEAD:  $(git rev-parse HEAD)"
            exit 1
          fi
          echo "main HEAD matches tag SHA (${GITHUB_SHA})"

      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/rust/native-deps@v0

      - name: Pin Cargo.toml to tag
        shell: bash
        run: |
          cargo install cargo-edit --locked
          cargo set-version "${GITHUB_REF_NAME}"

      - id: changelog
        uses: coroboros/ci/.github/actions/release/generate-changelog@v0

      - name: Mint a short-lived crates.io token via OIDC
        id: auth
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4

      - name: Publish to crates.io
        shell: bash
        env:
          # OIDC path: the short-lived token from the auth step. Bootstrap path:
          # the long-lived CARGO_REGISTRY_TOKEN secret (already in job env).
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || env.CARGO_REGISTRY_TOKEN }}
        run: |
          # The verify build runs (no --no-verify): it compiles the packaged
          # tarball standalone, catching files missing from `include` or path-dep
          # leakage that an in-workspace build misses. --allow-dirty covers the
          # in-place version pin.
          cargo publish --allow-dirty

      - uses: coroboros/ci/.github/actions/release/github-release@v0
        with:
          body: ${{ steps.changelog.outputs.body }}

      - uses: coroboros/ci/.github/actions/release/commit-artifacts@v0
        with:
          files: Cargo.toml Cargo.lock CHANGELOG.md

  security:
    uses: ./.github/workflows/security.yml
