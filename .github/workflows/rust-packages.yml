# Rust Packages CI
name: Rust Packages

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  preflight:
    if: ${{ github.ref_type == 'branch' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/rust/base@v0

  # cargo-deny owns the Rust supply-chain controls osv-scanner doesn't: crate
  # sources (crates.io only), licenses, banned/wildcard deps, and unmaintained or
  # yanked advisories. Reads the repo's deny.toml.
  supply-chain:
    if: ${{ github.ref_type == 'branch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20
        with:
          command: check

  publish:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation + commit-back to main
      id-token: write   # for crates.io OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify tag points to main HEAD
        shell: bash
        run: |
          if [ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]; then
            echo "::error::main has moved since the tag was pushed. Resolve manually."
            echo "  Tag SHA:    ${GITHUB_SHA}"
            echo "  main HEAD:  $(git rev-parse HEAD)"
            exit 1
          fi
          echo "main HEAD matches tag SHA (${GITHUB_SHA})"

      - uses: coroboros/ci/.github/actions/check-docs@v0

      - name: Pin Cargo.toml to tag
        shell: bash
        run: |
          cargo install cargo-edit --locked
          cargo set-version "${GITHUB_REF_NAME}"

      - id: changelog
        uses: coroboros/ci/.github/actions/release/generate-changelog@v0

      - name: Publish to crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "::notice::No CARGO_REGISTRY_TOKEN — skipping crates.io publish"
            exit 0
          fi
          # This tag is main HEAD, already built and tested by preflight, so skip the
          # redundant verify build; --allow-dirty covers the in-place version pin.
          cargo publish --no-verify --allow-dirty

      - uses: coroboros/ci/.github/actions/release/github-release@v0
        with:
          body: ${{ steps.changelog.outputs.body }}

      - uses: coroboros/ci/.github/actions/release/commit-artifacts@v0
        with:
          files: Cargo.toml Cargo.lock CHANGELOG.md

  security:
    uses: ./.github/workflows/security.yml
