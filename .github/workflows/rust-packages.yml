# Rust Packages CI
name: Rust Packages

on:
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
      HOMEBREW_TAP_TOKEN:
        required: false
      NPM_PACKAGE_REGISTRY_TOKEN:
        required: false

permissions:
  contents: read

# Tags serialize per repo so one release's commit-back can't race another's; branches key
# per ref and cancel superseded runs, never an in-flight release.
concurrency:
  group: release-${{ github.ref_type == 'tag' && github.repository || github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  preflight:
    if: ${{ github.ref_type == 'branch' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/rust/base@v0

  security-gate:
    uses: ./.github/workflows/security-gate.yml

  verify-package:
    if: ${{ github.ref_type == 'branch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: coroboros/ci/.github/actions/rust/native-deps@v0
      - name: Verify the published crate builds
        shell: bash
        run: cargo package --locked

  dist-plan:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
      matrix: ${{ steps.plan.outputs.matrix }}
      tap: ${{ steps.detect.outputs.tap }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.sha }}

      - id: detect
        name: Detect cargo-dist metadata
        shell: bash
        run: |
          # cargo-dist 0.32 keeps its global keys in [workspace.metadata.dist]; detect either table.
          if grep -qE '^\[(package|workspace)\.metadata\.dist\]' Cargo.toml 2>/dev/null; then
            echo "::notice::cargo-dist metadata present — binary distribution enabled"
            tap="$(grep -E '^[[:space:]]*tap[[:space:]]*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
            {
              echo "enabled=true"
              echo "tap=${tap}"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::no cargo-dist metadata — binary jobs skip"
            {
              echo "enabled=false"
              echo "tap="
            } >> "${GITHUB_OUTPUT}"
          fi

      - if: ${{ steps.detect.outputs.enabled == 'true' }}
        uses: coroboros/ci/.github/actions/rust/install-dist@v0

      - if: ${{ steps.detect.outputs.enabled == 'true' }}
        uses: coroboros/ci/.github/actions/rust/pin-version@v0

      - id: plan
        if: ${{ steps.detect.outputs.enabled == 'true' }}
        name: Compute build matrix
        shell: bash
        run: |
          dist plan --tag="${GITHUB_REF_NAME}" --output-format=json > plan-dist-manifest.json
          echo "matrix=$(jq -c '.ci.github.artifacts_matrix' plan-dist-manifest.json)" >> "${GITHUB_OUTPUT}"

      - if: ${{ steps.detect.outputs.enabled == 'true' }}
        name: Upload plan manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-plan-manifest
          path: plan-dist-manifest.json
          if-no-files-found: error

  dist-build:
    needs: [dist-plan, security-gate]   # no artifact builds until the gate passes
    if: ${{ needs.dist-plan.outputs.enabled == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.dist-plan.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    # The resolved target triple(s) reach the consumer's target-aware ci/setup.sh via native-deps.
    env:
      CARGO_DIST_TARGET: "${{ join(matrix.targets, ' ') }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.sha }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          key: ${{ join(matrix.targets, '_') }}

      - uses: coroboros/ci/.github/actions/rust/install-dist@v0

      - uses: coroboros/ci/.github/actions/rust/pin-version@v0

      - uses: coroboros/ci/.github/actions/rust/native-deps@v0

      - name: Install build system dependencies
        if: ${{ matrix.packages_install }}
        shell: bash
        run: ${{ matrix.packages_install }}

      # matrix.install_dist (dist's curl|sh installer) is ignored — dist is installed version-pinned above.
      - name: Build local artifacts
        shell: bash
        run: dist build --tag="${GITHUB_REF_NAME}" ${{ matrix.dist_args }}

      - name: Upload local artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-build-${{ join(matrix.targets, '_') }}
          path: target/distrib/
          if-no-files-found: error

  publish-package:
    if: ${{ github.ref_type == 'tag' && !cancelled() && needs.security-gate.result == 'success' && needs.dist-plan.result == 'success' && needs.dist-build.result != 'failure' }}
    needs: [security-gate, dist-plan, dist-build]   # gate must pass; a failed binary build blocks publish (skipped dist-build = library crate, still publishes)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release creation + commit-back to main
      id-token: write   # for crates.io OIDC Trusted Publishing
    # Surfaced as env so the OIDC auth step can branch on the token's presence.
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - uses: coroboros/ci/.github/actions/release/verify-tag@v0

      - uses: coroboros/ci/.github/actions/check-docs@v0
      - uses: coroboros/ci/.github/actions/rust/base@v0

      - uses: coroboros/ci/.github/actions/rust/pin-version@v0

      - id: changelog
        uses: coroboros/ci/.github/actions/release/generate-changelog@v0

      - name: Mint a short-lived crates.io token via OIDC
        id: auth
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4

      - name: Publish to crates.io
        shell: bash
        env:
          # OIDC path: the short-lived token from the auth step. Bootstrap path:
          # the long-lived CARGO_REGISTRY_TOKEN secret (already in job env).
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || env.CARGO_REGISTRY_TOKEN }}
        run: |
          # --allow-dirty covers the version pin (cargo set-version) + changelog regen; assert
          # nothing else is dirty so no stray file ships to the immutable crates.io release.
          unexpected="$(git status --porcelain | grep -vE '^.. (Cargo\.toml|Cargo\.lock|CHANGELOG\.md)$' || true)"
          if [ -n "${unexpected}" ]; then
            echo "::error::unexpected uncommitted changes before publish — only Cargo.toml/Cargo.lock/CHANGELOG.md may be dirty:"
            printf '%s\n' "${unexpected}"
            exit 1
          fi
          cargo publish --allow-dirty

      - uses: coroboros/ci/.github/actions/release/github-release@v0
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: ${{ needs.dist-plan.outputs.enabled }}   # draft for binary repos; dist-host undrafts

      - uses: coroboros/ci/.github/actions/release/commit-artifacts@v0
        with:
          files: Cargo.toml Cargo.lock CHANGELOG.md

  dist-host:
    needs: [dist-plan, dist-build, publish-package]
    if: ${{ needs.dist-plan.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload release assets + undraft the release publish created
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.sha }}

      - uses: coroboros/ci/.github/actions/rust/install-dist@v0

      - uses: coroboros/ci/.github/actions/rust/pin-version@v0

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: dist-build-*
          path: target/distrib/
          merge-multiple: true

      # The global build reads the same manifest `dist plan` produced (URL derivation).
      - name: Download plan manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-plan-manifest
          path: target/distrib/

      # Final asset URLs are deterministic (repo + tag), so --tag alone embeds non-draft links — no dist-owned release.
      - name: Build global artifacts
        shell: bash
        run: |
          cp target/distrib/plan-dist-manifest.json target/distrib/dist-manifest.json
          dist build --tag="${GITHUB_REF_NAME}" --artifacts=global --output-format=json > "${RUNNER_TEMP}/dist-manifest.json"

      - name: Harden Homebrew formula
        shell: bash
        run: python3 .github/scripts/harden-homebrew-formula.py target/distrib

      # Undraft before the formula/npm job so they resolve against a live release, not a draft.
      - name: Upload release assets and undraft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=()
          for f in target/distrib/*; do
            case "${f}" in
              *.json) ;;
              *) [ -f "${f}" ] && assets+=("${f}") ;;
            esac
          done
          if [ "${#assets[@]}" -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          fi
          gh release edit "${GITHUB_REF_NAME}" --draft=false

      - name: Upload global artifacts for publish
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-global
          path: |
            target/distrib/*.rb
            target/distrib/*-npm-package.tar.gz
          if-no-files-found: ignore

  verify-homebrew-formula:
    needs: [dist-plan, dist-host]
    if: ${{ needs.dist-plan.outputs.enabled == 'true' && needs.dist-plan.outputs.tap != '' }}
    runs-on: macos-latest
    steps:
      - name: Download global artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-global
          path: dist-global

      - name: Audit Homebrew formula
        shell: bash
        run: |
          shopt -s nullglob
          formulas=(dist-global/*.rb)
          if [ "${#formulas[@]}" -eq 0 ]; then
            echo "::notice::no Homebrew formula generated — skipping"
            exit 0
          fi

          tap="${{ needs.dist-plan.outputs.tap }}"
          tap_owner="${tap%%/*}"
          tap_repo="${tap#*/}"
          tap_name="${tap_repo#homebrew-}"
          tap_root="$(brew --repository)/Library/Taps/${tap_owner}/${tap_repo}"

          mkdir -p "${tap_root}/Formula"
          git -C "${tap_root}" init

          for formula in "${formulas[@]}"; do
            name="$(basename "${formula}" .rb)"
            cp "${formula}" "${tap_root}/Formula/${name}.rb"
            brew audit --strict --online "${tap_owner}/${tap_name}/${name}"
            brew fetch --formula "${tap_owner}/${tap_name}/${name}" --force
          done

  dist-publish:
    needs: [dist-plan, dist-host, verify-homebrew-formula]
    if: ${{ always() && needs.dist-plan.outputs.enabled == 'true' && needs.dist-host.result == 'success' && (needs.verify-homebrew-formula.result == 'success' || needs.verify-homebrew-formula.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm OIDC provenance
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Download global artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-global
          path: dist-global

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && needs.dist-plan.outputs.tap != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: ${{ needs.dist-plan.outputs.tap }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Publish Homebrew formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && needs.dist-plan.outputs.tap != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          formulas=(dist-global/*.rb)
          if [ "${#formulas[@]}" -eq 0 ]; then
            echo "::notice::no Homebrew formula generated — skipping"
            exit 0
          fi
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p homebrew-tap/Formula
          for f in "${formulas[@]}"; do
            cp "${f}" "homebrew-tap/Formula/$(basename "${f}")"
            git -C homebrew-tap add "Formula/$(basename "${f}")"
          done
          git -C homebrew-tap commit -m "release ${GITHUB_REF_NAME}"
          # Concurrent releases of different repos push to the shared tap; rebase-retry on contention.
          for attempt in 1 2 3 4 5; do
            git -C homebrew-tap push && break
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Homebrew tap push failed after ${attempt} attempts"
              exit 1
            fi
            echo "::warning::tap push rejected (attempt ${attempt}) — rebasing and retrying"
            git -C homebrew-tap pull --rebase
          done

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm shim
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGE_REGISTRY_TOKEN }}
        run: |
          shopt -s nullglob
          shims=(dist-global/*-npm-package.tar.gz)
          if [ "${#shims[@]}" -eq 0 ]; then
            echo "::notice::no npm shim generated — skipping"
            exit 0
          fi
          for shim in "${shims[@]}"; do
            # Provenance attests via the job's id-token on both auth paths — token bootstrap or OIDC.
            npm publish --provenance --access public "./${shim}"
          done

  security:
    uses: ./.github/workflows/security.yml
