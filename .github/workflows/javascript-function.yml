# Pipeline: check -> setup-npmrc -> lint -> build-js -> build-function -> test -> deploy-function -> invoke-function (optional) -> notify.
# AWS auth: OIDC (when `aws-role-*` inputs are set) with static-key fallback.
name: JavaScript Function CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: "22"
      function-archive:
        type: string
        required: false
        default: function.zip
      function-path:
        type: string
        required: false
        default: dist
      function-name:
        type: string
        required: true
      function-region:
        type: string
        required: false
        default: us-east-1
      function-deploy-disable:
        type: string
        required: false
        default: "false"
      function-invoke:
        type: string
        required: false
        default: "false"
      function-invoke-options:
        type: string
        required: false
        default: ""
      release-branch-pattern:
        type: string
        required: false
        default: '^release[/]((0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$'
      release-source-commit-pattern:
        type: string
        required: false
        default: "^Merge branch 'release[/]((0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*))' into 'master'"
      dev-branch:
        type: string
        required: false
        default: develop
      prod-branch:
        type: string
        required: false
        default: master
      aws-role-dev:
        description: IAM role ARN to assume for the dev account (OIDC). Leave empty to fall back to AWS_ACCESS_KEY_ID_DEV / AWS_SECRET_ACCESS_KEY_DEV.
        type: string
        required: false
        default: ""
      aws-role-prod:
        description: IAM role ARN to assume for the prod account (OIDC). Leave empty to fall back to AWS_ACCESS_KEY_ID_PROD / AWS_SECRET_ACCESS_KEY_PROD.
        type: string
        required: false
        default: ""
      npm-extra-config:
        type: string
        required: false
        default: ""
    secrets:
      NPM_CONFIG_FILE:
        required: true
      NPM_PACKAGE_REGISTRY:
        required: true
      NPM_PACKAGE_PROXY_REGISTRY:
        required: true
      NPM_PACKAGE_REGISTRY_TOKEN:
        required: true
      AWS_ACCESS_KEY_ID_DEV:
        required: false
      AWS_SECRET_ACCESS_KEY_DEV:
        required: false
      AWS_ACCESS_KEY_ID_PROD:
        required: false
      AWS_SECRET_ACCESS_KEY_PROD:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      GOOGLE_CHAT_WEBHOOK_URL:
        required: false

permissions:
  contents: read

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/check-readme@v0

  setup-npmrc:
    runs-on: ubuntu-latest
    needs: [check-readme]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/setup-npmrc@v0
        with:
          npm-config-file: ${{ secrets.NPM_CONFIG_FILE }}
          npm-extra-config: ${{ inputs.npm-extra-config }}

  check-npm-lint:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/pnpm-install@v0
        with:
          node-version: ${{ inputs.node-version }}
      - run: pnpm run lint
        shell: bash

  build-js:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/build-js@v0
        with:
          node-version: ${{ inputs.node-version }}

  build-function:
    runs-on: ubuntu-latest
    needs: [build-js]
    if: |
      github.ref_name == 'develop' || github.ref_name == 'master' || github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/build-function@v0
        with:
          function-archive: ${{ inputs.function-archive }}
          function-path: ${{ inputs.function-path }}
          node-version: ${{ inputs.node-version }}

  test-npm-unit:
    runs-on: ubuntu-latest
    needs: [setup-npmrc]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/pnpm-install@v0
        with:
          node-version: ${{ inputs.node-version }}
      - run: pnpm test
        shell: bash

  deploy-function:
    runs-on: ubuntu-latest
    needs: [build-function, test-npm-unit]
    if: |
      (inputs.function-deploy-disable != 'true' && inputs.function-deploy-disable != '1')
      && (github.ref_name == 'develop' || github.ref_name == 'master')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/aws-credentials@v0
        with:
          aws-region: ${{ inputs.function-region }}
          dev-branch: ${{ inputs.dev-branch }}
          prod-branch: ${{ inputs.prod-branch }}
          aws-role-dev: ${{ inputs.aws-role-dev }}
          aws-role-prod: ${{ inputs.aws-role-prod }}
          aws-access-key-id-dev: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key-dev: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-access-key-id-prod: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key-prod: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
      - uses: coroboros/ci/.github/actions/deploy-function@v0
        with:
          function-archive: ${{ inputs.function-archive }}
          function-name: ${{ inputs.function-name }}
          function-region: ${{ inputs.function-region }}
          function-deploy-disable: ${{ inputs.function-deploy-disable }}
          dev-branch: ${{ inputs.dev-branch }}
          prod-branch: ${{ inputs.prod-branch }}

  invoke-function:
    runs-on: ubuntu-latest
    needs: [deploy-function]
    if: ${{ inputs.function-invoke == 'true' || inputs.function-invoke == '1' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: coroboros/ci/.github/actions/aws-credentials@v0
        with:
          aws-region: ${{ inputs.function-region }}
          dev-branch: ${{ inputs.dev-branch }}
          prod-branch: ${{ inputs.prod-branch }}
          aws-role-dev: ${{ inputs.aws-role-dev }}
          aws-role-prod: ${{ inputs.aws-role-prod }}
          aws-access-key-id-dev: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key-dev: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-access-key-id-prod: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key-prod: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
      - uses: coroboros/ci/.github/actions/invoke-function@v0
        with:
          function-name: ${{ inputs.function-name }}
          function-region: ${{ inputs.function-region }}
          function-invoke-options: ${{ inputs.function-invoke-options }}
          dev-branch: ${{ inputs.dev-branch }}
          prod-branch: ${{ inputs.prod-branch }}

  notify:
    needs: [deploy-function]
    if: always() && needs.deploy-function.result != 'skipped'
    uses: coroboros/ci/.github/workflows/notify.yml@v0
    with:
      release-branch-pattern: ${{ inputs.release-branch-pattern }}
      release-source-commit-pattern: ${{ inputs.release-source-commit-pattern }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
