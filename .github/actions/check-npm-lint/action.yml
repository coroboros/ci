name: check-npm-lint
description: Runs the lint command.

inputs:
  command:
    description: Lint command.
    required: false
    default: pnpm lint
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.command }}
