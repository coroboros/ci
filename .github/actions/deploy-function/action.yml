# Calls `aws lambda update-function-code` with the zip produced by `build-function`.
# AWS credentials must be set in env before this action runs (see `aws-credentials` action).
name: Deploy Lambda function
description: aws lambda update-function-code with the function archive.

inputs:
  function-archive:
    description: Path to the function archive (zip).
    required: false
    default: function.zip
  function-name:
    description: Base function name (will get -dev or -prod suffix from `function-name-suffix`).
    required: true
  function-name-suffix:
    description: Suffix appended to function-name (e.g. `-dev`, `-prod`). Computed by the caller from the current branch.
    required: false
    default: ""
  function-region:
    description: AWS region.
    required: false
    default: us-east-1
  function-deploy-disable:
    description: When 'true' or '1', skip deployment.
    required: false
    default: "false"
  dev-branch:
    description: Branch name mapped to the -dev suffix.
    required: false
    default: develop
  prod-branch:
    description: Branch name mapped to the -prod suffix.
    required: false
    default: master

runs:
  using: composite
  steps:
    - name: Echo inputs
      shell: bash
      env:
        FUNCTION_ARCHIVE: ${{ inputs.function-archive }}
        FUNCTION_DEPLOY_DISABLE: ${{ inputs.function-deploy-disable }}
        FUNCTION_NAME: ${{ inputs.function-name }}
        FUNCTION_REGION: ${{ inputs.function-region }}
      run: |
        echo "FUNCTION_ARCHIVE         | ${FUNCTION_ARCHIVE}"
        echo "FUNCTION_DEPLOY_DISABLE  | ${FUNCTION_DEPLOY_DISABLE}"
        echo "FUNCTION_NAME            | ${FUNCTION_NAME}"
        echo "FUNCTION_REGION          | ${FUNCTION_REGION}"

    - name: Download function archive
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: function-archive
        path: .

    - name: Deploy
      shell: bash
      env:
        FUNCTION_ARCHIVE: ${{ inputs.function-archive }}
        FUNCTION_NAME_INPUT: ${{ inputs.function-name }}
        FUNCTION_NAME_SUFFIX: ${{ inputs.function-name-suffix }}
        FUNCTION_REGION: ${{ inputs.function-region }}
        FUNCTION_DEPLOY_DISABLE: ${{ inputs.function-deploy-disable }}
        DEV_BRANCH: ${{ inputs.dev-branch }}
        PROD_BRANCH: ${{ inputs.prod-branch }}
      run: |
        if [ "${FUNCTION_DEPLOY_DISABLE}" = "true" ] || [ "${FUNCTION_DEPLOY_DISABLE}" = "1" ]; then
          echo "FUNCTION_DEPLOY_DISABLE is set, skipping"
          exit 0
        fi

        # Resolve full function name: explicit suffix wins, else dev/prod branch routing.
        if [ -n "${FUNCTION_NAME_SUFFIX}" ]; then
          function_full="${FUNCTION_NAME_INPUT}${FUNCTION_NAME_SUFFIX}"
        elif [ "${GITHUB_REF_NAME}" = "${DEV_BRANCH}" ]; then
          function_full="${FUNCTION_NAME_INPUT}-dev"
        elif [ "${GITHUB_REF_NAME}" = "${PROD_BRANCH}" ]; then
          function_full="${FUNCTION_NAME_INPUT}-prod"
        else
          function_full="${FUNCTION_NAME_INPUT}"
        fi

        deploy_function="aws lambda update-function-code
          --function-name ${function_full}
          --region ${FUNCTION_REGION}
          --zip-file fileb://./${FUNCTION_ARCHIVE}"
        echo "${deploy_function}"
        cmd="$(printf '%s' "${deploy_function}" | tr -d '\t\r\n')"
        eval "${cmd}"
