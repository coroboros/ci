name: release-github-release
description: Create a GitHub Release for the current tag with the provided notes body.

inputs:
  body:
    description: Release notes body.
    required: true
  draft:
    description: Create the release as a draft. Binary repos undraft after assets upload; library repos leave it false.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Create GitHub Release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        BODY: ${{ inputs.body }}
        DRAFT: ${{ inputs.draft }}
      run: |
        notes="$(mktemp)"
        printf '%s' "${BODY}" > "${notes}"
        draft_flag=()
        if [ "${DRAFT}" = "true" ]; then
          draft_flag=(--draft)
        fi
        gh release create "${GITHUB_REF_NAME}" \
          --title "${GITHUB_REF_NAME}" \
          --notes-file "${notes}" \
          "${draft_flag[@]}"
        rm -f "${notes}"
