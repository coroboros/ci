name: pack-check
description: Runs `pnpm publish --dry-run` (or `npm publish --dry-run`) to validate the tarball.

inputs:
  publish-via:
    description: CLI to dry-run with — `pnpm` or `npm`.
    required: false
    default: pnpm
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - if: inputs.publish-via == 'pnpm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm publish --dry-run --no-git-checks

    - if: inputs.publish-via == 'npm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm publish --dry-run
