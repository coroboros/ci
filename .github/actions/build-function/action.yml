name: Build function
description: Assemble a Lambda function archive (zip) from src/ and package.json.

inputs:
  function-archive:
    description: Output archive filename.
    required: false
    default: function.zip
  function-path:
    description: Directory holding the build output (usually `dist`).
    required: false
    default: dist
  node-version:
    description: Node.js version to set up.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack + activate pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Download dist artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      continue-on-error: true
      with:
        name: dist
        path: ${{ inputs.function-path }}

    - name: Download .npmrc artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      continue-on-error: true
      with:
        name: npmrc
        path: .

    - name: Assemble function archive
      shell: bash
      env:
        FUNCTION_ARCHIVE: ${{ inputs.function-archive }}
        FUNCTION_PATH: ${{ inputs.function-path }}
      run: |
        echo "Building function code in ${FUNCTION_PATH}..."

        if [ "$(jq -r '.scripts.build // empty' package.json)" = "" ]; then
          cp -aR src/. "${FUNCTION_PATH}/"
        fi

        cp package*.json .npmrc "${FUNCTION_PATH}/" 2>/dev/null || cp package*.json "${FUNCTION_PATH}/"
        # pnpm-lock.yaml is required for --frozen-lockfile inside FUNCTION_PATH.
        cp pnpm-lock.yaml "${FUNCTION_PATH}/" 2>/dev/null || true
        cd "${FUNCTION_PATH}" || (echo "unable to change directory for function path ${FUNCTION_PATH}" && exit 1)
        pnpm install --frozen-lockfile --ignore-scripts --prod || exit 1
        rm -f package*.json pnpm-lock.yaml
        zip -r ../"${FUNCTION_ARCHIVE}" .
        cd ..

    - name: Upload function archive
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: function-archive
        path: ${{ inputs.function-archive }}
        retention-days: 60
