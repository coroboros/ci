name: post-deploy-github-release
description: Creates a GitHub release for the pushed tag with the provided notes.

inputs:
  tag:
    description: Tag to release.
    required: false
    default: ${{ github.ref_name }}
  title:
    description: Release title.
    required: false
    default: ${{ github.ref_name }}
  notes:
    description: Release body (markdown).
    required: true
  github-token:
    description: gh CLI auth token.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG: ${{ inputs.tag }}
        TITLE: ${{ inputs.title }}
        NOTES: ${{ inputs.notes }}
      run: |
        printf '%s\n' "$NOTES" > /tmp/release-notes.md
        gh release create "$TAG" \
          --title "$TITLE" \
          --notes-file /tmp/release-notes.md
