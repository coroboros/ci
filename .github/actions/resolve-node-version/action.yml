name: Resolve Node.js version
description: Read .node-version from the repo if present; otherwise use the node-version input; fail when neither is set.

inputs:
  node-version:
    description: Fallback Node.js version when no `.node-version` file is present at the repo root.
    required: false
    default: ""

outputs:
  version:
    description: Resolved Node.js version (no `v` prefix).
    value: ${{ steps.r.outputs.version }}

runs:
  using: composite
  steps:
    - id: r
      shell: bash
      env:
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
        CI_TEXT_RED: "\e[31m"
        CI_TEXT_GREEN: "\e[32m"
        CI_TEXT_CLEAR: "\e[0m"
      run: |
        if [ -f .node-version ]; then
          v="$(tr -d '[:space:]v' < .node-version)"
          source=".node-version"
        elif [ -n "${INPUT_NODE_VERSION}" ]; then
          v="${INPUT_NODE_VERSION}"
          source="node-version input"
        else
          printf '%b\n' "${CI_TEXT_RED}Node.js version is required: provide a .node-version file at the repo root or pass the node-version input.${CI_TEXT_CLEAR}"
          exit 1
        fi
        printf '%b\n' "${CI_TEXT_GREEN}Resolved Node.js version: ${v} (from ${source})${CI_TEXT_CLEAR}"
        echo "version=${v}" >> "${GITHUB_OUTPUT}"
