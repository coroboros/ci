name: check-docs
description: Requires `README.md` at the package root. Optionally requires `docs/` when `require-docs-dir: true`.

inputs:
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'
  require-docs-dir:
    description: Also require a `docs/` directory.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        REQUIRE_DOCS_DIR: ${{ inputs.require-docs-dir }}
      run: |
        if [ ! -f README.md ]; then
          echo "::error::README.md must be present at $(pwd)"
          exit 1
        fi
        if [ "${REQUIRE_DOCS_DIR}" = "true" ] && [ ! -d docs ]; then
          echo "::error::docs/ directory must be present at $(pwd)"
          exit 1
        fi
        echo "docs OK"
