name: build-js
description: Run the pnpm build script if present; upload dist/ as an artifact.

inputs:
  node-version:
    description: Node.js version to set up.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack + activate pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Download .npmrc artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: npmrc
        path: .

    - name: Build
      shell: bash
      run: |
        mkdir -p dist
        if [ "$(jq .scripts.build package.json)" != "null" ]; then
          pnpm install --frozen-lockfile --ignore-scripts || exit 1
          pnpm run build
        else
          printf '%b\n' "${CI_TEXT_GREEN}Non required script 'build' skipped${CI_TEXT_CLEAR}"
        fi

    - name: Upload dist artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: dist
        path: dist
        retention-days: 60
        if-no-files-found: warn
