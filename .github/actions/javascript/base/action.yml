name: javascript-base
description: Base setup for a JavaScript pipeline job.

outputs:
  node-version:
    description: Resolved Node.js version (no `v` prefix).
    value: ${{ steps.resolve.outputs.node-version }}

runs:
  using: composite
  steps:
    - id: resolve
      name: Resolve Node.js version
      shell: bash
      run: |
        if [ ! -f .node-version ]; then
          echo "::error::.node-version file is required at the repo root"
          exit 1
        fi
        node_version="$(tr -d '[:space:]v' < .node-version)"
        echo "::notice::Resolved Node.js version: ${node_version} (from .node-version)"
        echo "node-version=${node_version}" >> "${GITHUB_OUTPUT}"

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ steps.resolve.outputs.node-version }}

    - name: Enable corepack and activate pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Install Socket Firewall
      shell: bash
      run: npm install -g sfw

    - name: Setup pnpm cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Generate .npmrc at repo root
      shell: bash
      run: |
        if [ -z "${NPM_CONFIG_FILE}" ]; then
          echo "::error::NPM_CONFIG_FILE env var is required (set at workflow level from secrets.NPM_CONFIG_FILE)"
          exit 1
        fi
        printf '%s' "${NPM_CONFIG_FILE}" > .npmrc
        if [ -n "${NPM_EXTRA_CONFIG}" ]; then
          printf '\n%s\n' "${NPM_EXTRA_CONFIG}" >> .npmrc
        fi

    - name: Install dependencies
      shell: bash
      # Fail-closed: no sfw, no install.
      run: sfw pnpm install --frozen-lockfile --ignore-scripts

    - name: Lint
      shell: bash
      run: pnpm run lint

    - name: Build
      shell: bash
      run: |
        if [ "$(jq .scripts.build package.json)" != "null" ]; then
          pnpm run build
        else
          echo "::notice::Non required script 'build' skipped"
        fi

    - name: Test
      shell: bash
      run: pnpm test
