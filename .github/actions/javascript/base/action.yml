# JavaScript Base
name: javascript-base
description: Base setup for a JavaScript pipeline job.

outputs:
  node-version:
    description: Resolved Node.js version (no `v` prefix).
    value: ${{ steps.resolve.outputs.node-version }}

runs:
  using: composite
  steps:
    - id: resolve
      name: Resolve Node.js version + log run context
      shell: bash
      run: |
        echo "Run context:"
        echo "  GITHUB_REF_NAME       | ${GITHUB_REF_NAME}"
        echo "  GITHUB_REF_SLUG       | $(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | head -c 63 | sed 's/-$//')"
        echo "  GITHUB_REF_TYPE       | ${GITHUB_REF_TYPE}"
        echo "  GITHUB_REPOSITORY     | ${GITHUB_REPOSITORY}"
        echo "  GITHUB_SERVER_URL     | ${GITHUB_SERVER_URL}"
        echo "  GITHUB_REPOSITORY_URL | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

        if [ ! -f .node-version ]; then
          echo "::error::.node-version file is required at the repo root"
          exit 1
        fi
        node_version="$(tr -d '[:space:]v' < .node-version)"
        echo "Resolved Node.js version: ${node_version} (from .node-version)"
        echo "node-version=${node_version}" >> "${GITHUB_OUTPUT}"

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ steps.resolve.outputs.node-version }}

    - name: Enable corepack + activate pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Generate .npmrc at repo root
      shell: bash
      run: |
        if [ -z "${NPM_CONFIG_FILE}" ]; then
          echo "::error::NPM_CONFIG_FILE env var is required (set at workflow level from secrets.NPM_CONFIG_FILE)"
          exit 1
        fi
        printf '%s' "${NPM_CONFIG_FILE}" > .npmrc
        if [ -n "${NPM_EXTRA_CONFIG}" ]; then
          printf '\n%s\n' "${NPM_EXTRA_CONFIG}" >> .npmrc
        fi

    - name: README check
      shell: bash
      run: |
        [ -f README.md ] || (echo "::error::A README.md file must be present at project root" && exit 1)
        echo "README.md present"

    - name: pnpm install (frozen lockfile, ignore scripts)
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts
