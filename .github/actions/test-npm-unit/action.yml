name: test-npm-unit
description: Runs the test command.

inputs:
  command:
    description: Test command.
    required: false
    default: pnpm test
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.command }}
