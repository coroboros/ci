name: test-npm-unit
description: |
  GitLab `test-npm-unit` equivalent — runs the package's test script. Default
  command targets pnpm; override via `command` for non-pnpm consumers.

inputs:
  command:
    description: Test command to run.
    required: false
    default: pnpm test
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.command }}
