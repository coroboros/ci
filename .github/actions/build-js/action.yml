name: Build JS
description: Run the pnpm build script if present; upload dist/ as an artifact.

inputs:
  require-build:
    description: When 'true', fail if package.json has no `scripts.build`.
    required: false
    default: "false"
  node-version:
    description: Node.js version to set up.
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack + activate pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Download .npmrc artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      continue-on-error: true
      with:
        name: npmrc
        path: .

    - name: Build
      shell: bash
      env:
        REQUIRE_BUILD: ${{ inputs.require-build }}
        CI_TEXT_RED: "\e[31m"
        CI_TEXT_CLEAR: "\e[0m"
      run: |
        mkdir -p dist
        has_build="$(jq -r '.scripts.build // empty' package.json)"

        if [ "${REQUIRE_BUILD}" = "true" ] && [ -z "${has_build}" ]; then
          printf '%b\n' "${CI_TEXT_RED}Script 'build' is required${CI_TEXT_CLEAR}"
          exit 1
        fi

        if [ -n "${has_build}" ]; then
          pnpm install --frozen-lockfile --ignore-scripts || exit 1
          pnpm run build
        else
          echo "Non required script 'build' skipped"
        fi

    - name: Upload dist artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: dist
        path: dist
        retention-days: 60
        if-no-files-found: warn
