name: check-npm-typecheck
description: Runs the typecheck command.

inputs:
  command:
    description: Typecheck command.
    required: false
    default: pnpm typecheck
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.command }}
