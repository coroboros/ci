# Non-blocking by design — callers wrap with `continue-on-error: true` at the step or job level.
name: Check API docs
description: Fail if docs/api is missing or has no v0/v1 subdirectory with API files.

runs:
  using: composite
  steps:
    - name: Verify docs/api presence
      shell: bash
      env:
        CI_TEXT_RED: "\e[31m"
        CI_TEXT_CLEAR: "\e[0m"
      run: |
        echo "CI_COMMIT_REF_NAME    | ${GITHUB_REF_NAME}"
        echo "CI_COMMIT_REF_SLUG    | $(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | head -c 63 | sed 's/-$//')"
        echo "PROJECT_BASE          | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
        [ -d docs/api ] || (printf '%b\n' "${CI_TEXT_RED}A docs/api directory must be present${CI_TEXT_CLEAR}" && exit 1)
        [ -d docs/api/v0 ] || [ -d docs/api/v1 ] || (printf '%b\n' "${CI_TEXT_RED}At least a docs/api/v0 or docs/api/v1 directory with API files must be present${CI_TEXT_CLEAR}" && exit 1)
