name: verify-tag-version
description: Fails if `GITHUB_REF_NAME` does not match `package.json.version`.

inputs:
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pkg_version=$(node -p "require('./package.json').version")
        tag_version="${GITHUB_REF_NAME}"
        if [ "$pkg_version" != "$tag_version" ]; then
          echo "::error::tag ($tag_version) does not match package.json version ($pkg_version)"
          exit 1
        fi
        echo "tag ${tag_version} matches package.json version"
