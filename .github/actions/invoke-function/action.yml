# Calls `aws lambda invoke`, parses the JSON response, fails on errorMessage.
# AWS credentials must be set in env before this action runs (see `aws-credentials` action).
name: Invoke Lambda function
description: aws lambda invoke and fail on errorMessage.

inputs:
  function-name:
    description: Base function name.
    required: true
  function-name-suffix:
    description: Suffix appended to function-name (`-dev`, `-prod`).
    required: false
    default: ""
  function-region:
    description: AWS region.
    required: false
    default: us-east-1
  function-invoke-options:
    description: Extra options for `aws lambda invoke`.
    required: false
    default: ""
  function-log-path:
    description: File the response is written to.
    required: false
    default: function-log.json
  dev-branch:
    description: Branch name mapped to the -dev suffix.
    required: false
    default: develop
  prod-branch:
    description: Branch name mapped to the -prod suffix.
    required: false
    default: master

runs:
  using: composite
  steps:
    - name: Invoke
      shell: bash
      env:
        FUNCTION_NAME_INPUT: ${{ inputs.function-name }}
        FUNCTION_NAME_SUFFIX: ${{ inputs.function-name-suffix }}
        FUNCTION_REGION: ${{ inputs.function-region }}
        FUNCTION_INVOKE_OPTIONS: ${{ inputs.function-invoke-options }}
        FUNCTION_LOG_PATH: ${{ inputs.function-log-path }}
        DEV_BRANCH: ${{ inputs.dev-branch }}
        PROD_BRANCH: ${{ inputs.prod-branch }}
        CI_TEXT_RED: "\e[31m"
        CI_TEXT_GREEN: "\e[32m"
        CI_TEXT_CLEAR: "\e[0m"
      run: |
        if [ -n "${FUNCTION_NAME_SUFFIX}" ]; then
          function_full="${FUNCTION_NAME_INPUT}${FUNCTION_NAME_SUFFIX}"
        elif [ "${GITHUB_REF_NAME}" = "${DEV_BRANCH}" ]; then
          function_full="${FUNCTION_NAME_INPUT}-dev"
        elif [ "${GITHUB_REF_NAME}" = "${PROD_BRANCH}" ]; then
          function_full="${FUNCTION_NAME_INPUT}-prod"
        else
          function_full="${FUNCTION_NAME_INPUT}"
        fi

        invoke_function="aws lambda invoke
          --function-name ${function_full}
          --region ${FUNCTION_REGION}
          ${FUNCTION_LOG_PATH}
          ${FUNCTION_INVOKE_OPTIONS}"
        echo "${invoke_function}"
        cmd="$(printf '%s' "${invoke_function}" | tr -d '\t\r\n')"
        eval "${cmd}"

        res="$(cat "${FUNCTION_LOG_PATH}")"
        type="$(echo "${res}" | jq -r type 2>/dev/null)"

        echo "Function log type: ${type}"
        printf 'Function log:\n%s\n' "${res}"

        if [ "${type}" = "object" ]; then
          error="$(echo "${res}" | jq -r .errorMessage)"
          if [ "${error}" != "null" ]; then
            printf '%b\n' "${CI_TEXT_RED}Error when invoking function ${function_full}.\n${error}${CI_TEXT_CLEAR}"
            exit 1
          else
            printf '%b\n' "${CI_TEXT_GREEN}Successfully invoked function ${function_full}.\n${res}${CI_TEXT_CLEAR}"
          fi
        fi
