# Rust Pin Version Action Composite
name: rust-pin-version
description: Pin Cargo.toml to the current tag via cargo set-version.

runs:
  using: composite
  steps:
    - name: Pin Cargo.toml to tag
      shell: bash
      env:
        CARGO_EDIT_VERSION: "0.13.11"
      run: |
        cargo install cargo-edit --version "${CARGO_EDIT_VERSION}" --locked
        cargo set-version "${GITHUB_REF_NAME}"
