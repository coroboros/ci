# Rust Base Action Composite
name: rust-base
description: Base setup for a Rust pipeline job.

runs:
  using: composite
  steps:
    - name: Resolve Rust toolchain
      shell: bash
      run: |
        if [ ! -f rust-toolchain.toml ]; then
          echo "::error::rust-toolchain.toml is required at the repo root"
          exit 1
        fi
        channel="$(grep -E '^[[:space:]]*channel[[:space:]]*=' rust-toolchain.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
        echo "::notice::Resolved Rust toolchain: ${channel:-unset} (from rust-toolchain.toml)"

    - name: Setup cargo cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Native build dependencies
      uses: coroboros/ci/.github/actions/rust/native-deps@v0

    - name: Format
      shell: bash
      run: cargo fmt --check

    - name: Lint
      shell: bash
      run: cargo clippy --all-targets --locked -- -D warnings

    - name: Test
      shell: bash
      run: cargo test --locked
