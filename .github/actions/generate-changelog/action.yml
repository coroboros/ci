name: generate-changelog
description: Parses Conventional Commits since the previous tag, groups them by type, and prepends the entry to `CHANGELOG.md`.

inputs:
  version:
    description: Release version, no `v` prefix.
    required: true
  working-directory:
    description: Directory containing `CHANGELOG.md`.
    required: false
    default: '.'

outputs:
  body:
    description: Rendered CHANGELOG entry.
    value: ${{ steps.gen.outputs.body }}

runs:
  using: composite
  steps:
    - id: gen
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: node "${{ github.action_path }}/generate.mjs"
