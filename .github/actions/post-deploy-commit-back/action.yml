name: post-deploy-commit-back
description: Commits and pushes `paths` back to `default-branch` as a bot. Warns on push rejection instead of failing.

inputs:
  paths:
    description: Space-separated paths to stage.
    required: false
    default: package.json CHANGELOG.md
  commit-message:
    description: Commit message.
    required: true
  default-branch:
    description: Target branch.
    required: false
    default: main
  working-directory:
    description: Prefix added to each entry in `paths`.
    required: false
    default: '.'
  user-name:
    description: Git `user.name`.
    required: false
    default: 'github-actions[bot]'
  user-email:
    description: Git `user.email`.
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'

runs:
  using: composite
  steps:
    - shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        WD: ${{ inputs.working-directory }}
        MSG: ${{ inputs.commit-message }}
        BRANCH: ${{ inputs.default-branch }}
        USER_NAME: ${{ inputs.user-name }}
        USER_EMAIL: ${{ inputs.user-email }}
      run: |
        git config user.name "$USER_NAME"
        git config user.email "$USER_EMAIL"
        # shellcheck disable=SC2086
        set -- $PATHS
        prefixed=()
        for p in "$@"; do
          if [ "$WD" = "." ] || [ -z "$WD" ]; then
            prefixed+=("$p")
          else
            prefixed+=("${WD%/}/$p")
          fi
        done
        git add "${prefixed[@]}"
        if git diff --staged --quiet; then
          echo "nothing to commit back"
          exit 0
        fi
        git commit -m "$MSG"
        if ! git push origin "HEAD:${BRANCH}"; then
          echo "::warning::failed to push release bump to ${BRANCH} — check branch protection or GITHUB_TOKEN permissions"
        fi
