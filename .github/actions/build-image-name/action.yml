# Computes image name and tags, exposes them as outputs AND uploads a `build.env` dotenv artifact
# so downstream jobs that share the build context can `cat build.env` and re-export.
name: Build image name
description: Compute IMAGE_NAME / IMAGE_TAG / IMAGE_REF_TAG / IMAGE for the container build.

inputs:
  image-registry:
    description: Container registry URL (e.g. ghcr.io).
    required: true
  image-target:
    description: Target path under the registry. Defaults to the repo owner.
    required: false
    default: ""
  image-tag:
    description: Optional override for the main image tag. Falls back to git tag, then ref slug.
    required: false
    default: ""

outputs:
  image:
    description: Full image URI (registry/target/repo:sha).
    value: ${{ steps.compute.outputs.image }}
  image-name:
    description: Image name without tag.
    value: ${{ steps.compute.outputs.image-name }}
  image-tag:
    description: SHA-based tag.
    value: ${{ steps.compute.outputs.image-tag }}
  image-ref-tag:
    description: Reference-based tag (override > git-tag > ref-slug).
    value: ${{ steps.compute.outputs.image-ref-tag }}

runs:
  using: composite
  steps:
    - name: Compute image name
      id: compute
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image-registry }}
        IMAGE_TARGET_INPUT: ${{ inputs.image-target }}
        IMAGE_TAG_INPUT: ${{ inputs.image-tag }}
        CI_COMMIT_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        CI_COMMIT_REF_NAME: ${{ github.ref_name }}
        CI_COMMIT_SHA: ${{ github.sha }}
        CI_PROJECT_NAMESPACE: ${{ github.repository_owner }}
        CI_PROJECT_NAME: ${{ github.event.repository.name }}
      run: |
        ref_slug="$(echo "${CI_COMMIT_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | head -c 63 | sed 's/-$//')"
        image_ref_tag="${IMAGE_TAG_INPUT:-${CI_COMMIT_TAG:-${ref_slug}}}"
        image_tag="${CI_COMMIT_SHA}"
        image_target="${IMAGE_TARGET_INPUT:-${CI_PROJECT_NAMESPACE}}"
        image_name="${IMAGE_REGISTRY}/${image_target}/${CI_PROJECT_NAME}"
        image="${image_name}:${image_tag}"

        {
          echo "IMAGE_NAME=${image_name}"
          echo "IMAGE_TAG=${image_tag}"
          echo "IMAGE_REF_TAG=${image_ref_tag}"
          echo "IMAGE=${image}"
          # Container scanning aliases.
          echo "CS_IMAGE=${image}"
          echo "CS_DEFAULT_BRANCH_IMAGE=${image}"
          echo "CI_APPLICATION_REPOSITORY=${image_name}"
          echo "CI_APPLICATION_TAG=${image_tag}"
        } > build.env

        {
          echo "image=${image}"
          echo "image-name=${image_name}"
          echo "image-tag=${image_tag}"
          echo "image-ref-tag=${image_ref_tag}"
        } >> "${GITHUB_OUTPUT}"

        echo "IMAGE_TARGET | ${image_target}"
        cat build.env

    - name: Upload build.env
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: build-env
        path: build.env
        retention-days: 7
