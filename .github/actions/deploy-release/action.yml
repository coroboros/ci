# Emits a release-deployed marker — the actual deploy happens via container image pull
# on the target environment, or via consumer-specific steps (Helm, kubectl, terraform)
# added in the caller workflow.
name: Deploy release marker
description: Mark a release as deployed (success message). Hook for external deploy mechanisms.

inputs:
  release:
    description: Release name (typically the repo name).
    required: false
    default: ${{ github.event.repository.name }}
  env-name:
    description: Logical env name (`dev`, `int`, `prod`, `dynamic`).
    required: false
    default: dev
  is-dynamic:
    description: When 'true', append the CI environment slug to the release name.
    required: false
    default: "false"
  environment-slug:
    description: Environment slug for dynamic deploys (typically the lowercased branch name).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Deploy
      shell: bash
      env:
        RELEASE_INPUT: ${{ inputs.release }}
        ENV_NAME: ${{ inputs.env-name }}
        IS_DYNAMIC: ${{ inputs.is-dynamic }}
        ENVIRONMENT_SLUG: ${{ inputs.environment-slug }}
        CI_TEXT_GREEN: "\e[32m"
        CI_TEXT_CLEAR: "\e[0m"
      run: |
        release="${RELEASE_INPUT}"
        if [ "${IS_DYNAMIC}" = "true" ] && [ -n "${ENVIRONMENT_SLUG}" ]; then
          release="${release}-${ENVIRONMENT_SLUG}"
        fi
        echo "RELEASE  | ${release}"
        echo "ENV_NAME | ${ENV_NAME}"
        printf '%b\n' "${CI_TEXT_GREEN}Successfully deployed ${release}!${CI_TEXT_CLEAR}"
