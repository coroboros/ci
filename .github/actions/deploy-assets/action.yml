# Calls `aws s3 sync` with the configured option string. AWS credentials must be
# set in env before this action runs (see `aws-credentials` action).
name: Deploy assets to S3
description: aws s3 sync ASSETS_PATH to s3://ASSETS_DESTINATION.

inputs:
  assets-path:
    description: Local path to the built assets.
    required: false
    default: dist
  assets-destination:
    description: S3 bucket (and optional prefix) to sync to.
    required: true
  assets-region:
    description: AWS region.
    required: false
    default: us-east-1
  assets-options:
    description: Extra options passed to `aws s3 sync`.
    required: false
    default: '--exclude "*.DS_Store" --cache-control "max-age=31536000"'

runs:
  using: composite
  steps:
    - name: aws s3 sync
      shell: bash
      env:
        ASSETS_PATH: ${{ inputs.assets-path }}
        ASSETS_DESTINATION: ${{ inputs.assets-destination }}
        ASSETS_REGION: ${{ inputs.assets-region }}
        ASSETS_OPTIONS: ${{ inputs.assets-options }}
      run: |
        deploy_assets="aws s3 sync ${ASSETS_PATH} s3://${ASSETS_DESTINATION} --region ${ASSETS_REGION} ${ASSETS_OPTIONS}"
        echo "${deploy_assets}"
        cmd="$(printf '%s' "${deploy_assets}" | tr -d '\t\r\n')"
        eval "${cmd}"
