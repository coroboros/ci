name: deploy-npm-package
description: Publishes the package to the npm registry across 4 modes — pnpm|npm × oidc|token.

inputs:
  publish-via:
    description: CLI to publish with — `pnpm` or `npm`.
    required: false
    default: pnpm
  use-oidc:
    description: Publish via npm Trusted Publisher. When `false`, reads `npm-token`.
    required: false
    default: 'true'
  access:
    description: Package access — `public` or `restricted`.
    required: false
    default: public
  provenance:
    description: Emit provenance attestation.
    required: false
    default: 'true'
  working-directory:
    description: Path to the package root.
    required: false
    default: '.'
  npm-token:
    description: Auth token passed to `NODE_AUTH_TOKEN` when `use-oidc: false`.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: deploy-package (pnpm / oidc)
      if: inputs.publish-via == 'pnpm' && inputs.use-oidc == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm publish --access ${{ inputs.access }} ${{ inputs.provenance == 'true' && '--provenance' || '' }} --no-git-checks

    - name: deploy-package (npm / oidc)
      if: inputs.publish-via == 'npm' && inputs.use-oidc == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm publish --access ${{ inputs.access }} ${{ inputs.provenance == 'true' && '--provenance' || '' }}

    - name: deploy-package (pnpm / token)
      if: inputs.publish-via == 'pnpm' && inputs.use-oidc != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
      run: pnpm publish --access ${{ inputs.access }} ${{ inputs.provenance == 'true' && '--provenance' || '' }} --no-git-checks

    - name: deploy-package (npm / token)
      if: inputs.publish-via == 'npm' && inputs.use-oidc != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
      run: npm publish --access ${{ inputs.access }} ${{ inputs.provenance == 'true' && '--provenance' || '' }}
