name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    uses: coroboros/ci/.github/workflows/npm-publish.yml@v1
    with:
      use-oidc: false
      provenance: false
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
