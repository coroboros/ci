# Canonical Coroboros cargo-deny ruleset — imposed on every consumer.
# The security/cargo-deny composite sparse-checks this file out of coroboros/ci
# and passes it via `--config`, so a consumer's own deny.toml is ignored. Edit
# the policy here only; per-repo exceptions are not accepted (parity with gitleaks).

[graph]
# No `targets` key on purpose: keep every platform's dependencies in scope.
# `targets` is a narrowing filter — adding it would let another OS's deps escape
# the gate, so a macOS-only malicious dep can't slip past an ubuntu-run check.
all-features = true

[advisories]
# v2 schema: vulnerability advisories always error and cannot be downgraded;
# `ignore` is the only suppressor and is kept empty. unmaintained/unsound at
# "all" scope error on any matching crate (an abandoned crate is a takeover vector).
yanked = "deny"
unmaintained = "all"
unsound = "all"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[bans]
wildcards = "deny"
allow-wildcard-paths = true   # path/workspace + dev-deps resolve; public-crate registry wildcards still fail
multiple-versions = "warn"    # duplicate versions are bloat, not an attack vector — warn, never block

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "CDLA-Permissive-2.0",
  "BSL-1.0",
]
confidence-threshold = 0.8
private = { ignore = true }
